<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>My present to the Computer Science Class</title>
<style>
  .grow-image {
    max-width: 300px;
    margin-top: 40px;
    cursor: pointer;
    transition: transform 0.3s ease;
    display: block;
    margin-left: auto;
    margin-right: auto;
  }
  .grow-image:hover {
    transform: scale(1.3);
  }
  .nav-buttons {
    margin-top: 30px;
  }
  .nav-buttons a {
    display: inline-block;
    margin: 5px;
    padding: 8px 16px;
    background: #888;
    color: white;
    text-decoration: none;
    font-family: 'Times New Roman', sans-serif;
    font-size: 16px;
  }
  .nav-buttons a:hover {
    background: #666;
  }
  #points-counter {
    font-size: 22px;
    margin-top: 15px;
    font-family: 'Times New Roman', sans-serif;
  }
  #hall-of-fame {
    margin-top: 20px;
    font-family: 'Times New Roman', sans-serif;
    font-size: 16px;
  }
  #hall-of-fame ol {
    display: inline-block;
    text-align: left;
  }
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    pointer-events: none;
    animation: fall 1.5s ease-out forwards;
    z-index: 9999;
  }
  @keyframes fall {
    0%   { opacity: 1; transform: translateY(0) rotate(0deg); }
    100% { opacity: 0; transform: translateY(300px) rotate(720deg); }
  }
  #click-name-input {
    font-family: 'Times New Roman', sans-serif;
    font-size: 16px;
    padding: 4px;
    margin-top: 10px;
  }
  #add-to-fame-btn {
    font-family: 'Times New Roman', sans-serif;
    font-size: 16px;
    margin-left: 5px;
    padding: 4px 10px;
    cursor: pointer;
  }
</style>
</head>
<body id="main-body" style="margin:0;font-family:'Times New Roman',sans-serif;text-align:center;background:#fff;">

<div style="background:#888;color:white;padding:20px;font-size:24px;text-align:left;">
  ⬆️Look! We are learning about DNS⬆️
</div>

<div class="nav-buttons">
  <a href="notes.html">📝 Personal Notes</a>
  <a href="impressions.html">🎙️ Impressions</a>
  <a href="settings.html">⚙️ Settings</a>
</div>

<div style="margin-top:30px;">
  <p>I was in the shop yesterday and I saw some ready-to-eat apricots. And I said "You know what, I am ready to eat apricots".</p>

  <img src="https://media.licdn.com/dms/image/v2/D4E03AQGk_K3flD3F4A/profile-displayphoto-scale_400_400/B4EZhDUdMdGYAk-/0/1753476093639?e=1776297600&v=beta&t=r1fBtdF1qJd3dnSExF_yhcwXXw-9P8j3RC6JUf0L_BM"
       class="grow-image"
       alt="Mr Brown"
       id="mr-brown-img"
       onclick="addPoint(event)">

  <div id="points-counter">Mr Brown Points: <span id="pts">0</span></div>

  <div id="hall-of-fame">
    <p><b>🏆 Hall of Fame 🏆</b></p>
    <ol id="fame-list">
      <li>Nobody yet... click his face!</li>
    </ol>
    <div style="margin-top:8px;">
      Your name: <input type="text" id="click-name-input" placeholder="Enter your name">
      <button id="add-to-fame-btn" onclick="addToFame()">Add me to the leaderboard</button>
    </div>
  </div>
</div>

<script>
  // Load bg colour from settings
  const savedBg = localStorage.getItem('bgColour');
  if (savedBg) document.getElementById('main-body').style.background = savedBg;

  let points = 0;
  const colours = ['red','orange','yellow','lime','cyan','pink','magenta','white','gold'];

  function addPoint(e) {
    points++;
    document.getElementById('pts').textContent = points;
    spawnConfetti(e.clientX, e.clientY);
    playBleep();
  }

  function spawnConfetti(x, y) {
    for (let i = 0; i < 18; i++) {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.left = (x + (Math.random()-0.5)*80) + 'px';
      c.style.top = y + 'px';
      c.style.background = colours[Math.floor(Math.random()*colours.length)];
      c.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 1600);
    }
  }

  function playBleep() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = 440 + Math.random()*400;
      o.type = 'square';
      g.gain.setValueAtTime(0.15, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      o.start(); o.stop(ctx.currentTime + 0.3);
    } catch(e) {}
  }

  // Hall of fame stored in localStorage
  let fameData = JSON.parse(localStorage.getItem('fameData') || '[]');

  function renderFame() {
    const list = document.getElementById('fame-list');
    if (fameData.length === 0) {
      list.innerHTML = '<li>Nobody yet... click his face!</li>';
      return;
    }
    fameData.sort((a,b) => b.score - a.score);
    list.innerHTML = fameData.map(e => `<li>${e.name} — ${e.score} points</li>`).join('');
  }
  renderFame();

  function addToFame() {
    const name = document.getElementById('click-name-input').value.trim();
    if (!name) { alert('Enter your name first!'); return; }
    if (points === 0) { alert('Click Mr Brown first!'); return; }
    const existing = fameData.find(e => e.name.toLowerCase() === name.toLowerCase());
    if (existing) {
      if (points > existing.score) existing.score = points;
    } else {
      fameData.push({name, score: points});
    }
    localStorage.setItem('fameData', JSON.stringify(fameData));
    renderFame();
    alert('Added ' + name + ' with ' + points + ' points!');
  }
</script>
</body>
</html>
